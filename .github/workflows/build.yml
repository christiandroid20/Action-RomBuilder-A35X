name: LineageOS A35x Build STABLE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:

    # ─────────────────────────────
    # ENTORNO SEGURO
    # ─────────────────────────────
    - name: Prepare environment
      run: |
        set -e
        echo "Modo estable"
        ulimit -v $((14*1024*1024))

    # ─────────────────────────────
    # REPO TOOL
    # ─────────────────────────────
    - name: Setup repo
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    # ─────────────────────────────
    # INIT CONTROLADO
    # ─────────────────────────────
    - name: Init repo
      run: |
        set -e
        mkdir -p ~/build/lineage
        cd ~/build/lineage

        if [ ! -d ".repo" ]; then
          repo init -u https://github.com/LineageOS/android.git -b lineage-22.0
        fi

    # ─────────────────────────────
    # SYNC SEGURO (SIN REDOWNLOAD)
    # ─────────────────────────────
    - name: Sync source
      run: |
        set -e
        cd ~/build/lineage
        repo sync -c -j2 --optimized-fetch --prune

    # ─────────────────────────────
    # DEVICE TREE
    # ─────────────────────────────
    - name: Device tree
      run: |
        set -e
        cd ~/build/lineage
        mkdir -p device/samsung

        if [ ! -d "device/samsung/a35x" ]; then
          git clone https://github.com/christiandroid20/android_device_samsung_a35x_roms device/samsung/a35x
        else
          cd device/samsung/a35x
          git reset --hard
          git pull
        fi

    # ─────────────────────────────
    # CCACHE SEGURO 🔥
    # ─────────────────────────────
    - name: Setup ccache safely
      run: |
        set -e
        mkdir -p ~/.ccache
        chmod -R 755 ~/.ccache

        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache

        # Validar integridad
        ccache -s || true

        # Reparar si hay corrupción
        ccache -C || true

        # Configuración estable
        ccache -M 15G
        ccache -o compression=true
        ccache -o max_size=15G

    # ─────────────────────────────
    # VALIDACIÓN RÁPIDA (CRÍTICA)
    # ─────────────────────────────
    - name: Quick validation
      run: |
        set -e
        cd ~/build/lineage

        source build/envsetup.sh

        lunch lineage_a35x-ap3a-userdebug

        echo "Validación OK"

    # ─────────────────────────────
    # BUILD REAL
    # ─────────────────────────────
    - name: Build ROM
      run: |
        set -e
        cd ~/build/lineage
        source build/envsetup.sh
        lunch lineage_a35x-userdebug

        # equilibrio estabilidad/velocidad
        nice -n 10 ionice -c2 -n7 mka bacon -j2

    # ─────────────────────────────
    # OUTPUT
    # ─────────────────────────────
    - name: Upload ROM
      uses: actions/upload-artifact@v4
      with:
        name: lineage-a35x
        path: ~/build/lineage/out/target/product/a35x/
