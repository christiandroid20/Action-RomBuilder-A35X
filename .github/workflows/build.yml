name: LineageOS A35x Build TURBO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:

    # ─────────────────────────────
    # LIMITES INTELIGENTES
    # ─────────────────────────────
    - name: Limit system usage
      run: |
        echo "Modo turbo controlado"
        ulimit -v $((14*1024*1024))   # deja margen al sistema

    # ─────────────────────────────
    # REPO TOOL
    # ─────────────────────────────
    - name: Setup repo tool
      run: |
        mkdir -p ~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod +x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    # ─────────────────────────────
    # INIT SOLO SI NO EXISTE
    # ─────────────────────────────
    - name: Init LineageOS
      run: |
        mkdir -p ~/build/lineage
        cd ~/build/lineage
        if [ ! -d ".repo" ]; then
          repo init -u https://github.com/LineageOS/android.git -b lineage-22.0
        fi

    # ─────────────────────────────
    # SYNC OPTIMIZADO 🔥
    # ─────────────────────────────
    - name: Sync source
      run: |
        cd ~/build/lineage
        repo sync -j2 --no-clone-bundle --no-tags

    # ─────────────────────────────
    # DEVICE TREE (SMART)
    # ─────────────────────────────
    - name: Device tree
      run: |
        cd ~/build/lineage
        mkdir -p device/samsung
        if [ ! -d "device/samsung/a35x" ]; then
          git clone https://github.com/christiandroid20/android_device_samsung_a35x_roms device/samsung/a35x
        else
          cd device/samsung/a35x
          git pull
        fi

    # ─────────────────────────────
    # CCACHE AGRESIVO
    # ─────────────────────────────
    - name: Setup ccache
      run: |
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache
        ccache -M 15G
        ccache -o compression=true

    # ─────────────────────────────
    # BUILD (TURBO CONTROLADO)
    # ─────────────────────────────
    - name: Build ROM
      run: |
        cd ~/build/lineage
        source build/envsetup.sh
        lunch lineage_a35x-userdebug

        # 2 hilos = mejor balance en A8
        nice -n 10 ionice -c2 -n7 mka bacon -j2

    # ─────────────────────────────
    # OUTPUT
    # ─────────────────────────────
    - name: Upload ROM
      uses: actions/upload-artifact@v4
      with:
        name: lineage-a35x
        path: ~/build/lineage/out/target/product/a35x/
